<div class="min-h-screen flex items-center justify-center bg-background-dark relative overflow-hidden py-12">
  <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/20 rounded-full blur-[120px]"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-secondary/10 rounded-full blur-[120px]"></div>

  <div class="w-full max-w-4xl p-8 relative z-10">
    <div class="text-center mb-12">
      <h1 class="font-serif text-5xl font-bold tracking-[0.2em] text-white mb-4 uppercase silver-glow">DOGHMANI</h1>
      <p class="font-display text-silver-400 text-sm tracking-[0.3em] uppercase">Select Active Workspace</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      <div 
        *ngFor="let agency of agencies()" 
        (click)="onSelect(agency)"
        class="glass-card p-8 rounded-2xl border border-white/10 hover:border-primary/50 transition-all cursor-pointer group hover:-translate-y-2"
      >
        <div class="h-16 w-16 bg-primary/10 rounded-xl flex items-center justify-center mb-6 group-hover:bg-primary/20 transition-colors">
          <span class="material-symbols-outlined text-primary text-3xl">domain</span>
        </div>
        
        <h3 class="text-xl font-bold text-white mb-2 group-hover:text-primary transition-colors">{{ agency.name }}</h3>
        <div class="flex items-center gap-2">
          <span class="text-[10px] uppercase tracking-widest px-2 py-1 bg-white/5 rounded border border-white/10 text-silver-400">
            {{ agency.role }}
          </span>
        </div>

        <div class="mt-8 flex items-center gap-2 text-primary font-bold text-xs uppercase tracking-widest opacity-0 group-hover:opacity-100 transition-opacity">
          Enter Workspace
          <span class="material-symbols-outlined text-sm">arrow_forward</span>
        </div>
      </div>
    </div>

    <div class="text-center mt-12">
      <button (click)="authService.logout()" class="text-silver-500 hover:text-white transition-colors text-xs uppercase tracking-widest flex items-center gap-2 mx-auto">
        <span class="material-symbols-outlined text-sm">logout</span>
        Sign Out
      </button>
    </div>
  </div>
</div>
