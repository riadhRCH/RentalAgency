<div class="p-8 max-w-7xl mx-auto space-y-12">
  <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
    <div>
      <h1 class="font-serif text-4xl font-bold tracking-tight text-slate-900 dark:text-white uppercase silver-glow">
        Properties Portfolio
      </h1>
      <p class="font-display text-slate-500 text-sm tracking-widest uppercase mt-1">
        Manage Agency Listings
      </p>
    </div>
    
    <div class="flex items-center gap-4 w-full md:w-auto">
      <select 
        [(ngModel)]="typeFilter" 
        (ngModelChange)="onFilterChange()"
        class="bg-white/5 border border-white/10 text-white rounded p-3 text-xs font-bold uppercase tracking-widest outline-none focus:border-primary transition-all appearance-none cursor-pointer pr-10">
        <option value="" class="bg-background-dark">All Types</option>
        <option value="apartment" class="bg-background-dark">Apartment</option>
        <option value="villa" class="bg-background-dark">Villa</option>
        <option value="house" class="bg-background-dark">House</option>
        <option value="land" class="bg-background-dark">Land</option>
      </select>
      
      <button class="bg-primary hover:bg-primary/90 text-white px-6 py-3 rounded uppercase text-xs font-bold tracking-widest transition-all shadow-lg shadow-primary/20 flex items-center gap-2">
        <span class="material-symbols-outlined text-sm">add</span>
        New Listing
      </button>
    </div>
  </header>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
    <div *ngIf="loading()" class="col-span-full p-12 text-center text-slate-500">
      <span class="material-symbols-outlined animate-spin text-4xl">progress_activity</span>
    </div>

    <div *ngIf="!loading() && properties.length === 0" class="col-span-full p-12 text-center text-slate-500">
      <app-empty-state 
        icon="home_off"
        title="No Properties Listed"
        description="Your agency's property portfolio is currently empty or no listings match your criteria."
        [actionLabel]="typeFilter ? 'Clear Filter' : 'Add Property'"
        (action)="typeFilter ? clearFilter() : null">
      </app-empty-state>
    </div>

    <div *ngFor="let prop of properties" class="glass-card rounded-2xl border border-white/10 overflow-hidden group hover:border-primary/50 transition-all flex flex-col">
      <div class="relative h-48 bg-slate-800">
        <img *ngIf="prop.photos.length" [src]="prop.photos[0]" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity">
        <div *ngIf="!prop.photos.length" class="w-full h-full flex items-center justify-center text-slate-600">
          <span class="material-symbols-outlined text-5xl">image</span>
        </div>
        <div class="absolute top-4 left-4 px-3 py-1 bg-background-dark/80 backdrop-blur rounded text-[10px] font-bold uppercase tracking-widest text-primary border border-primary/20">
          {{ prop.type }}
        </div>
        <div class="absolute bottom-4 right-4 px-3 py-1 bg-primary text-white rounded text-xs font-bold tracking-widest">
          ${{ prop.price | number }}
        </div>
      </div>

      <div class="p-6 space-y-4 flex-1 flex flex-col">
        <div>
          <h3 class="font-bold text-white text-lg tracking-tight mb-1">{{ prop.reference }}</h3>
          <p class="text-xs text-slate-500 flex items-center gap-1">
            <span class="material-symbols-outlined text-xs">location_on</span>
            {{ prop.address }}
          </p>
        </div>

        <div class="grid grid-cols-2 gap-4 py-4 border-y border-white/5">
          <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-primary text-sm">square_foot</span>
            <span class="text-xs text-slate-300 font-bold uppercase tracking-widest">{{ prop.surface }}m²</span>
          </div>
          <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-primary text-sm">info</span>
            <span class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">{{ prop.status }}</span>
          </div>
        </div>

        <div class="pt-4 mt-auto flex items-center justify-between">
          <button class="text-[10px] font-bold uppercase tracking-widest text-slate-400 hover:text-primary transition-colors flex items-center gap-1">
            Edit Details
            <span class="material-symbols-outlined text-sm">edit</span>
          </button>
          <button (click)="deleteProperty(prop._id)" class="p-2 rounded hover:bg-red-500/10 text-slate-500 hover:text-red-500 transition-all">
            <span class="material-symbols-outlined text-sm">delete</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
