<div class="p-6">
  <div class="mb-6 flex justify-between items-center">
    <h1 class="text-2xl font-bold text-gray-900">Rental Details: {{ rental?.propertyId?.reference }}</h1>
    <div class="flex space-x-4">
      <button (click)="closeRental()" *ngIf="rental?.status !== 'CLOSED'" class="bg-amber-600 hover:bg-amber-700 text-white px-4 py-2 rounded-lg font-medium transition-colors">
        Close Rental
      </button>
      <a routerLink="/dashboard/rentals" class="text-indigo-600 hover:text-indigo-800 font-medium transition-colors flex items-center">
        <i class="fas fa-arrow-left mr-1"></i> Back to Directory
      </a>
    </div>
  </div>

  <div *ngIf="isLoading" class="flex justify-center items-center h-64">
    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600"></div>
  </div>

  <div *ngIf="!isLoading && rental" class="bg-white rounded-xl shadow-sm overflow-hidden p-6">
    <form [formGroup]="rentalForm" (ngSubmit)="onSubmit()" class="space-y-8">
      
      <!-- Property Info (Read-only) -->
      <section>
        <h3 class="text-lg font-semibold text-gray-800 border-b pb-2 mb-4">Property Assets</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-gray-50 p-4 rounded-lg">
          <div>
            <span class="text-xs font-bold text-gray-500 uppercase block mb-1">Reference</span>
            <span class="text-gray-900 font-medium">{{ rental.propertyId?.reference }}</span>
          </div>
          <div>
            <span class="text-xs font-bold text-gray-500 uppercase block mb-1">Address</span>
            <span class="text-gray-900 font-medium">{{ rental.propertyId?.address }}</span>
          </div>
        </div>
      </section>

      <!-- Customer Profile -->
      <section>
        <h3 class="text-lg font-semibold text-gray-800 border-b pb-2 mb-4">Customer Profile</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
            <input type="text" formControlName="customerName" class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
            <input type="text" formControlName="customerPhone" class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
            <input type="email" formControlName="customerEmail" class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Identity Status</label>
            <select formControlName="identityVerificationStatus" class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
              <option value="PENDING">Pending Verification</option>
              <option value="VERIFIED">Verified</option>
              <option value="REJECTED">Rejected</option>
            </select>
          </div>
        </div>
      </section>

      <!-- Financial Details -->
      <section formGroupName="financialDetails">
        <h3 class="text-lg font-semibold text-gray-800 border-b pb-2 mb-4">Financial Details</h3>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Rent Amount (TND)</label>
            <input type="number" formControlName="rentAmount" class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Deposit Amount (TND)</label>
            <input type="number" formControlName="depositAmount" class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Payment Frequency</label>
            <select formControlName="paymentFrequency" class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
              <option value="MONTHLY">Monthly</option>
              <option value="QUARTERLY">Quarterly</option>
              <option value="YEARLY">Yearly</option>
            </select>
          </div>
        </div>
      </section>

      <!-- Timeline -->
      <section formGroupName="timeline">
        <h3 class="text-lg font-semibold text-gray-800 border-b pb-2 mb-4">Timeline</h3>
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Start Date</label>
            <input type="date" formControlName="startDate" class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Duration (Months)</label>
            <input type="number" formControlName="duration" class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">End Date</label>
            <input type="date" formControlName="endDate" class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Projected Renewal</label>
            <input type="date" formControlName="renewalDate" class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
          </div>
        </div>
      </section>

      <!-- Metadata -->
      <section formGroupName="metadata">
        <h3 class="text-lg font-semibold text-gray-800 border-b pb-2 mb-4">Additional Info</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Utility Hand-over Notes</label>
            <textarea formControlName="utilityNotes" rows="3" class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500"></textarea>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Emergency Contact Info</label>
            <textarea formControlName="emergencyContact" rows="3" class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500"></textarea>
          </div>
        </div>
      </section>

      <!-- Status -->
      <section>
        <h3 class="text-lg font-semibold text-gray-800 border-b pb-2 mb-4">Current Status</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Rental Status</label>
            <select formControlName="status" class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
              <option value="CURRENT">Current</option>
              <option value="EXPIRING_SOON">Expiring Soon</option>
              <option value="OVERDUE">Overdue</option>
              <option value="CLOSED">Closed</option>
            </select>
          </div>
        </div>
      </section>

      <div class="pt-6 border-t flex justify-end">
        <button type="submit" [disabled]="rentalForm.invalid || isSaving" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg font-medium transition-colors">
          <span *ngIf="!isSaving">Save Changes</span>
          <span *ngIf="isSaving">Saving...</span>
        </button>
      </div>
    </form>
  </div>
</div>
