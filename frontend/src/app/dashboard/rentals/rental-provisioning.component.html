<div class="p-6">
  <div class="mb-6 flex justify-between items-center">
    <h1 class="text-2xl font-bold text-gray-900">Rental Provisioning</h1>
    <a routerLink="/dashboard/rentals" class="text-indigo-600 hover:text-indigo-800 font-medium transition-colors">
      <i class="fas fa-arrow-left mr-1"></i> Back to Directory
    </a>
  </div>

  <div *ngIf="notification" class="mb-6 bg-blue-50 border-l-4 border-blue-400 p-4 rounded-md">
    <div class="flex">
      <div class="flex-shrink-0">
        <i class="fas fa-info-circle text-blue-400"></i>
      </div>
      <div class="ml-3">
        <p class="text-sm text-blue-700">
          {{ notification }}
        </p>
      </div>
    </div>
  </div>

  <form [formGroup]="rentalForm" (ngSubmit)="onSubmit()" class="bg-white rounded-xl shadow-sm overflow-hidden p-6 space-y-8">
    
    <!-- Property Selection -->
    <section>
      <h3 class="text-lg font-semibold text-gray-800 border-b pb-2 mb-4">Property Assets</h3>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Select Property</label>
          <select formControlName="propertyId" class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
            <option value="">Select a property</option>
            <option *ngFor="let p of properties" [value]="p._id">{{ p.reference }} - {{ p.address }}</option>
          </select>
          <div *ngIf="rentalForm.get('propertyId')?.touched && rentalForm.get('propertyId')?.invalid" class="text-red-500 text-xs mt-1">Property is required</div>
        </div>
      </div>
    </section>

    <!-- Customer Profile -->
    <section>
      <h3 class="text-lg font-semibold text-gray-800 border-b pb-2 mb-4">Customer Profile</h3>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
          <input type="text" formControlName="customerName" class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500" placeholder="e.g. John Doe">
          <div *ngIf="rentalForm.get('customerName')?.touched && rentalForm.get('customerName')?.invalid" class="text-red-500 text-xs mt-1">Name is required</div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
          <input type="text" formControlName="customerPhone" class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500" placeholder="+216 12345678">
          <div *ngIf="rentalForm.get('customerPhone')?.touched && rentalForm.get('customerPhone')?.invalid" class="text-red-500 text-xs mt-1">Phone is required</div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
          <input type="email" formControlName="customerEmail" class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500" placeholder="john@example.com">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Identity Status</label>
          <select formControlName="identityVerificationStatus" class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
            <option value="PENDING">Pending Verification</option>
            <option value="VERIFIED">Verified</option>
            <option value="REJECTED">Rejected</option>
          </select>
        </div>
      </div>
    </section>

    <!-- Financial Details -->
    <section formGroupName="financialDetails">
      <h3 class="text-lg font-semibold text-gray-800 border-b pb-2 mb-4">Financial Details</h3>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Rent Amount (TND)</label>
          <input type="number" formControlName="rentAmount" class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Deposit Amount (TND)</label>
          <input type="number" formControlName="depositAmount" class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Payment Frequency</label>
          <select formControlName="paymentFrequency" class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
            <option value="MONTHLY">Monthly</option>
            <option value="QUARTERLY">Quarterly</option>
            <option value="YEARLY">Yearly</option>
          </select>
        </div>
      </div>
    </section>

    <!-- Timeline -->
    <section formGroupName="timeline">
      <h3 class="text-lg font-semibold text-gray-800 border-b pb-2 mb-4">Timeline</h3>
      <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Start Date</label>
          <input type="date" formControlName="startDate" class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Duration (Months)</label>
          <input type="number" formControlName="duration" class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">End Date</label>
          <input type="date" formControlName="endDate" class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500" readonly>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Projected Renewal</label>
          <input type="date" formControlName="renewalDate" class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
        </div>
      </div>
    </section>

    <!-- Metadata -->
    <section formGroupName="metadata">
      <h3 class="text-lg font-semibold text-gray-800 border-b pb-2 mb-4">Additional Info</h3>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Utility Hand-over Notes</label>
          <textarea formControlName="utilityNotes" rows="3" class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500" placeholder="e.g. Electricity meter reading: 45678"></textarea>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Emergency Contact Info</label>
          <textarea formControlName="emergencyContact" rows="3" class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500" placeholder="e.g. Next of kin contact"></textarea>
        </div>
      </div>
    </section>

    <div class="pt-6 border-t flex justify-end">
      <button type="submit" [disabled]="rentalForm.invalid || isLoading" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
        <span *ngIf="!isLoading">Provision Rental</span>
        <span *ngIf="isLoading" class="flex items-center">
          <i class="fas fa-circle-notch fa-spin mr-2"></i> Processing...
        </span>
      </button>
    </div>
  </form>
</div>
