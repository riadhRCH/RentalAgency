<div class="carousel-container w-screen h-screen overflow-hidden bg-black cursor-pointer" (click)="onContainerClick()">
  <!-- Carousel items -->
  <div class="carousel-wrapper relative w-full h-full">
    <div 
      *ngFor="let item of items; let i = index" 
      [class.active]="isActive(i)"
      class="carousel-item absolute inset-0 w-full h-full transition-opacity duration-1000 opacity-0"
    >
      <!-- Background image with overlay -->
      <div 
        class="absolute inset-0 bg-cover bg-center bg-no-repeat"
        [style.backgroundImage]="'url(' + item.image + ')'"
      >
        <!-- Dark overlay -->
        <div class="absolute inset-0 bg-black/50"></div>
      </div>

      <!-- Content -->
      <div class="absolute inset-0 flex flex-col items-center justify-center px-4 sm:px-8 md:px-16 lg:px-24">
        <div class="text-center max-w-3xl animate-slideUp" [class.slide-visible]="isActive(i)">
          <!-- Title -->
          <h1 class="text-3xl sm:text-4xl md:text-5xl lg:text-6xl font-bold text-white mb-4 sm:mb-6 md:mb-8 text-shadow">
            {{ item.title }}
          </h1>

          <!-- Description -->
          <p class="text-base sm:text-lg md:text-xl lg:text-2xl text-gray-100 leading-relaxed text-shadow mb-8 sm:mb-12">
            {{ item?.description }}
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
