<div class="flex flex-col items-center justify-center p-12 text-center animate-in fade-in zoom-in duration-300">
    <div class="h-20 w-20 rounded-full bg-slate-800/20 flex items-center justify-center text-silver-500 mb-6 border border-white/5 shadow-inner">
        <span class="material-symbols-outlined text-4xl opacity-50">{{ icon }}</span>
    </div>
    
    <h3 class="font-serif text-2xl font-bold text-white uppercase tracking-tight mb-2 silver-glow">
        {{ title }}
    </h3>
    
    <p class="font-display text-silver-400 text-sm tracking-widest uppercase max-w-md mx-auto mb-8 leading-relaxed">
        {{ description }}
    </p>
    
    <button *ngIf="actionLabel" 
            (click)="action.emit()"
            class="bg-primary hover:bg-primary/90 text-white px-8 py-3 rounded text-[10px] font-bold uppercase tracking-[0.2em] transition-all shadow-lg shadow-primary/20 flex items-center gap-2 group">
        <span class="material-symbols-outlined text-sm group-hover:rotate-90 transition-transform">add</span>
        {{ actionLabel }}
    </button>
</div>
