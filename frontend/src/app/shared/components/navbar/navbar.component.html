<header class="h-16 glass-card border-b border-slate-800/50 flex items-center justify-between px-8 sticky top-0 z-40">
    <!-- Left: Context Info -->
    <div class="flex items-center gap-4">
        <div class="flex flex-col">
            <span class="text-[10px] uppercase tracking-widest text-silver-500 font-bold leading-none mb-1">Active Agency</span>
            <span class="text-sm font-bold text-white uppercase tracking-wider">
                {{ authService.activeAgencyId() ? 'Doghmani Homes & Estates' : 'No Agency Selected' }}
            </span>
        </div>
        
        <div class="h-8 w-px bg-slate-800/50 mx-2"></div>
        
        <div class="hidden md:flex items-center gap-2 px-3 py-1.5 rounded bg-white/5 border border-white/10">
            <span class="material-symbols-outlined text-xs text-primary">verified</span>
            <span class="text-[10px] font-bold text-silver-300 uppercase tracking-widest">Premium Partner</span>
        </div>
    </div>

    <!-- Right: Quick Actions -->
    <div class="flex items-center gap-4">
        <!-- Search -->
        <button class="p-2 text-silver-400 hover:text-white hover:bg-white/5 rounded-lg transition-all">
            <span class="material-symbols-outlined">search</span>
        </button>

        <!-- Notifications -->
        <button class="p-2 text-silver-400 hover:text-white hover:bg-white/5 rounded-lg transition-all relative">
            <span class="material-symbols-outlined">notifications</span>
            <span class="absolute top-2 right-2 h-2 w-2 bg-primary rounded-full border-2 border-background-dark"></span>
        </button>

        <div class="h-8 w-px bg-slate-800/50 mx-2"></div>
    </div>
</header>
