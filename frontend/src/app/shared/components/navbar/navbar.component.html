<header class="dashboard-navbar glass-card border-b border-slate-800/50 sticky top-0 z-40">
    <!-- Left: Context Info -->
    <div class="flex min-w-0 items-center gap-3">
        <button
            type="button"
            (click)="menuToggle.emit()"
            class="inline-flex h-11 w-11 shrink-0 items-center justify-center rounded-xl border border-white/10 bg-white/5 text-silver-300 transition-all hover:border-primary/40 hover:text-white"
            aria-label="Toggle sidebar">
            <span class="material-symbols-outlined text-[20px]">
                {{ mobileSidebarOpen ? 'close' : (sidebarCollapsed ? 'menu_open' : 'menu') }}
            </span>
        </button>

        <div class="min-w-0 flex flex-col">
            <span class="text-[8px] sm:text-[10px] uppercase tracking-widest text-silver-500 font-bold leading-none mb-1">{{ 'NAVBAR.ACTIVE_AGENCY' | translate }}</span>
            <span class="truncate text-xs sm:text-sm font-bold text-white uppercase tracking-wider max-w-[120px] sm:max-w-none">
                {{ authService.activeAgencyId() ? ('NAVBAR.DEFAULT_AGENCY_NAME' | translate) : ('COMMON.NO_AGENCY_SELECTED' | translate) }}
            </span>
        </div>
        
        <div class="hidden h-8 w-px bg-slate-800/50 lg:block"></div>
        
        <div class="hidden xl:flex items-center gap-2 px-3 py-1.5 rounded bg-white/5 border border-white/10">
            <span class="material-symbols-outlined text-xs text-primary">verified</span>
            <span class="text-[10px] font-bold text-silver-300 uppercase tracking-widest">{{ 'COMMON.PREMIUM_PARTNER' | translate }}</span>
        </div>
    </div>

    <!-- Right: Quick Actions -->
    <div class="flex items-center gap-2 sm:gap-3">
        <div class="flex items-center gap-1 rounded-lg border border-white/10 bg-white/5 p-1">
            <button
                type="button"
                (click)="setLanguage('en')"
                [class.bg-primary]="i18n.language() === 'en'"
                [class.text-white]="i18n.language() === 'en'"
                [class.text-silver-400]="i18n.language() !== 'en'"
                class="rounded px-2 py-1 text-[10px] font-bold uppercase tracking-widest transition-all">
                {{ 'LANGUAGE.EN' | translate }}
            </button>
            <button
                type="button"
                (click)="setLanguage('fr')"
                [class.bg-primary]="i18n.language() === 'fr'"
                [class.text-white]="i18n.language() === 'fr'"
                [class.text-silver-400]="i18n.language() !== 'fr'"
                class="rounded px-2 py-1 text-[10px] font-bold uppercase tracking-widest transition-all">
                {{ 'LANGUAGE.FR' | translate }}
            </button>
        </div>

        <!-- Search -->
        <button class="hidden p-2 text-silver-400 hover:text-white hover:bg-white/5 rounded-lg transition-all sm:inline-flex">
            <span class="material-symbols-outlined">search</span>
        </button>

        <!-- Notifications -->
        <button class="p-2 text-silver-400 hover:text-white hover:bg-white/5 rounded-lg transition-all relative">
            <span class="material-symbols-outlined">notifications</span>
            <span class="absolute top-2 right-2 h-2 w-2 bg-primary rounded-full border-2 border-background-dark"></span>
        </button>

        <div class="hidden h-8 w-px bg-slate-800/50 lg:block"></div>
    </div>
</header>
