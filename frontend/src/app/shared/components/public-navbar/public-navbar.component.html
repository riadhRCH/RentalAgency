        <button
            type="button"
            (click)="toggleMobileMenu()"
            class="inline-flex h-11 w-11 items-center justify-center rounded-xl border border-white/10 bg-white/5 text-silver-200 md:hidden"
            aria-label="Toggle navigation">
            <span class="material-symbols-outlined">{{ mobileMenuOpen ? 'close' : 'menu' }}</span>
        </button>
    </div>
    <div class="landing-nav-panel md:flex-1" [class.open]="mobileMenuOpen">
        <div class="flex flex-col gap-4 pt-4 md:flex-row md:items-center md:justify-between md:gap-6 md:pt-0">
        <div class="flex flex-col gap-3 md:flex-row md:items-center md:gap-8 text-sm font-medium tracking-widest uppercase text-silver-300">
            <a class="hover:text-primary transition-colors" href="#" (click)="closeMobileMenu()">Portfolio</a>
            <a class="hover:text-primary transition-colors" href="#" (click)="closeMobileMenu()">Off-Market</a>
            <a class="hover:text-primary transition-colors" href="#" (click)="closeMobileMenu()">Concierge</a>
            <a class="hover:text-primary transition-colors" href="#" (click)="closeMobileMenu()">Contact</a>
        </div>
        <div class="flex flex-col gap-3 md:flex-row md:items-center md:gap-4">
            <button class="hidden p-2 text-silver-400 hover:text-white transition-colors md:inline-flex">
                <span class="material-symbols-outlined">search</span>
            </button>
            
            <!-- Auth Button -->
            <ng-container *ngIf="!authService.isAuthenticated(); else userProfile">
                <a routerLink="/auth/login"
                    (click)="closeMobileMenu()"
                    class="inline-flex items-center justify-center bg-primary hover:bg-primary/90 text-white px-6 py-3 md:py-2 rounded uppercase text-xs font-bold tracking-widest transition-all shadow-lg shadow-primary/20">
                    Login
                </a>
            </ng-container>

            <ng-template #userProfile>
                <button (click)="navigateToDashboard()"
                    class="flex items-center justify-center md:justify-start gap-2 p-2 pr-4 rounded-full glass-card border border-white/10 hover:border-primary/50 transition-all group">
                    <div class="h-8 w-8 rounded-full bg-primary/20 flex items-center justify-center text-primary border border-primary/20">
                        <span class="material-symbols-outlined text-sm">person</span>
                    </div>
                    <span class="text-[10px] font-bold text-silver-300 uppercase tracking-widest group-hover:text-white transition-colors">
                        {{ authService.currentUser()?.firstName || 'Account' }}
                    </span>
                </button>
            </ng-template>

            <button
                class="bg-white/5 hover:bg-white/10 text-white px-6 py-3 md:py-2 rounded border border-white/10 uppercase text-xs font-bold tracking-widest transition-all">
                Book Viewing
            </button>
        </div>
        </div>
    </div>
