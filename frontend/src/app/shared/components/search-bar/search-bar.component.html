@if (isMobile()) {

  <!-- ── MOBILE: collapsed pill + bottom sheet ── -->
  <div class="search-pill" (click)="toggleSearch()">
    <span class="pill-tab-indicator">{{ getTabLabel(selectedPaymentTab) }}</span>
    <div class="pill-summary">
      @if (hasActiveFilters()) {
        <span class="pill-active-summary">{{ getFilterSummary() }}</span>
      } @else {
        <span class="pill-hint">Tap to search apartments, villas...</span>
      }
    </div>
    <button class="pill-search-btn" (click)="$event.stopPropagation(); onSearch()">
      <span class="material-symbols-outlined text-sm">search</span>
    </button>
  </div>

  <div class="search-overlay" [class.show]="isExpanded" (click)="toggleSearch()"></div>

  <div class="search-sheet" [class.open]="isExpanded">
    <div class="drag-handle" (click)="toggleSearch()"></div>

    <div class="sheet-tabs">
      @for (tab of tabs; track tab.value) {
        <button
          (click)="onPaymentTabChange(tab.value)"
          [class.active]="selectedPaymentTab === tab.value"
          class="sheet-tab">
          {{ tab.label }}
        </button>
      }
    </div>

    <div class="fields-grid">
      <div class="field-cell">
        <label class="field-label">
          <span class="material-symbols-outlined">location_on</span>
          Localisation
        </label>
        <input [(ngModel)]="searchLocation" (ngModelChange)="onInputChange()"
          type="text" class="field-input" placeholder="Ville, quartier, région">
      </div>
      <div class="field-cell">
        <label class="field-label">
          <span class="material-symbols-outlined">home_work</span>
          Type de bien
        </label>
        <select [(ngModel)]="searchType" (ngModelChange)="onInputChange()" class="field-input">
          <option value="">Tous types</option>
          <option value="apartment">Appartement</option>
          <option value="villa">Villa</option>
          <option value="house">Maison</option>
          <option value="land">Terrain</option>
        </select>
      </div>
      <div class="field-cell">
        <label class="field-label">
          <span class="material-symbols-outlined">payments</span>
          Budget max
        </label>
        <input [(ngModel)]="searchQuery" (ngModelChange)="onInputChange()"
          type="text" class="field-input" placeholder="Prix...">
      </div>
      <div class="field-cell">
        <label class="field-label">
          <span class="material-symbols-outlined">bed</span>
          Chambres
        </label>
        <input [(ngModel)]="searchRooms" (ngModelChange)="onInputChange()"
          type="text" class="field-input" placeholder="Nb. chambres...">
      </div>
    </div>

    <button (click)="onSearch(); toggleSearch()" class="sheet-search-btn">
      <span class="material-symbols-outlined text-sm">search</span>
      Search
    </button>
  </div>

} @else {

  <!-- ── DESKTOP: your existing search bar ── -->
  <div class="payment-type-tabs glass-card">
    <div class="tabs-container">
      <button
        (click)="onPaymentTabChange('LOCATION')"
        [class.active]="selectedPaymentTab === 'LOCATION'"
        class="tab-button">
        <span>LOCATION</span>
      </button>
      <button
        (click)="onPaymentTabChange('VENTE')"
        [class.active]="selectedPaymentTab === 'VENTE'"
        class="tab-button">
        <span>VENTE</span>
      </button>
      <button
        (click)="onPaymentTabChange('COURT-SEJOUR')"
        [class.active]="selectedPaymentTab === 'COURT-SEJOUR'"
        class="tab-button">
        <span>Family Escape</span>
      </button>
    </div>
  </div>

  <div class="search-panel glass-card p-6 md:p-8 rounded-xl shadow-2xl border-t border-white/10"
    style="border-top-left-radius: 0px; border-top-right-radius: 0px;">
    <div class="grid grid-cols-1 md:grid-cols-5 gap-6">
      <div class="space-y-2">
        <label class="text-[10px] uppercase tracking-widest text-silver-500 font-bold">Localisation</label>
        <div class="flex items-center gap-2 border-b border-slate-700 pb-2">
          <span class="material-symbols-outlined text-primary text-sm">location_on</span>
          <input [(ngModel)]="searchLocation" (ngModelChange)="onInputChange()"
            type="text"
            class="bg-transparent border-none text-white focus:ring-0 p-0 text-sm placeholder:text-slate-500 w-full"
            placeholder="Ville, quartier, région">
        </div>
      </div>
      <div class="space-y-2">
        <label class="text-[10px] uppercase tracking-widest text-silver-500 font-bold">Type de bien</label>
        <div class="flex items-center gap-2 border-b border-slate-700 pb-2">
          <span class="material-symbols-outlined text-primary text-sm">home_work</span>
          <select [(ngModel)]="searchType" (ngModelChange)="onInputChange()"
            class="bg-transparent border-none text-white focus:ring-0 p-0 text-sm w-full appearance-none">
            <option class="bg-background-dark" value="">Tous types</option>
            <option class="bg-background-dark" value="apartment">Appartement</option>
            <option class="bg-background-dark" value="villa">Villa</option>
            <option class="bg-background-dark" value="house">Maison</option>
            <option class="bg-background-dark" value="land">Terrain</option>
          </select>
        </div>
      </div>
      <div class="space-y-2">
        <label class="text-[10px] uppercase tracking-widest text-silver-500 font-bold">Budget</label>
        <div class="flex items-center gap-2 border-b border-slate-700 pb-2">
          <span class="material-symbols-outlined text-primary text-sm">payments</span>
          <input [(ngModel)]="searchQuery" (ngModelChange)="onInputChange()"
            type="text"
            class="bg-transparent border-none text-white focus:ring-0 p-0 text-sm placeholder:text-slate-500 w-full"
            placeholder="Prix...">
        </div>
      </div>
      <div class="space-y-2">
        <label class="text-[10px] uppercase tracking-widest text-silver-500 font-bold">Chambres</label>
        <div class="flex items-center gap-2 border-b border-slate-700 pb-2">
          <span class="material-symbols-outlined text-primary text-sm">bed</span>
          <input [(ngModel)]="searchRooms" (ngModelChange)="onInputChange()"
            type="text"
            class="bg-transparent border-none text-white focus:ring-0 p-0 text-sm placeholder:text-slate-500 w-full"
            placeholder="Nombre de chambres...">
        </div>
      </div>
      <div class="flex items-end">
        <button (click)="onSearch()"
          class="w-full bg-primary py-3 rounded font-bold uppercase tracking-widest text-xs hover:shadow-[0_0_20px_rgba(19,91,236,0.4)] transition-all">
          Search
        </button>
      </div>
    </div>
  </div>

}
