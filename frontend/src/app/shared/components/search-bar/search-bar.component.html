<div class="search-panel">
  <div class="search-grid">
    <label>
      <span>Search</span>
      <input
        [(ngModel)]="searchQuery"
        (ngModelChange)="onInputChange()"
        type="text"
        placeholder="Reference, address, description">
    </label>
    <label>
      <span>Location</span>
      <input
        [(ngModel)]="searchLocation"
        (ngModelChange)="onInputChange()"
        type="text"
        placeholder="City, district, area">
    </label>
    <label>
      <span>Property type</span>
      <select [(ngModel)]="searchType" (ngModelChange)="onInputChange()">
        <option *ngFor="let option of propertyTypes" [value]="option.value">{{ option.label }}</option>
      </select>
    </label>
    <div class="search-actions">
      <button type="button" class="primary" (click)="onSearch()">Search</button>
      <button type="button" class="secondary" (click)="onClear()">Reset</button>
    </div>
  </div>
</div>
