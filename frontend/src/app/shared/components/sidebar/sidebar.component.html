<button
    type="button"
    class="sidebar-backdrop"
    [class.open]="mobileOpen"
    (click)="closeMobile.emit()"
    aria-label="Close sidebar"></button>

<div
    class="sidebar-shell glass-card border-r border-slate-800/50 flex flex-col fixed left-0 top-0"
    [class.collapsed]="collapsed"
    [class.mobile-open]="mobileOpen">
    <!-- App Name / Logo -->
    <a
        routerLink="/"
        (click)="onNavigate()"
        class="sidebar-brand p-4 sm:p-6 border-b border-slate-800/50 flex items-center gap-3 cursor-pointer group">
        <div class="h-8 w-8 shrink-0 rounded-full bg-primary/20 flex items-center justify-center text-primary border border-primary/20 group-hover:border-primary/50 transition-all">
            <span class="material-symbols-outlined text-sm">home_work</span>
        </div>
        <h1 class="sidebar-label text-lg sm:text-xl font-black tracking-widest silver-glow uppercase group-hover:text-white transition-all truncate">DOGHMANI</h1>
    </a>

    <!-- Navigation Links -->
    <nav class="flex-1 overflow-y-auto py-6">
        <div class="px-4 space-y-1">
            <ng-container *ngFor="let item of navItems">
                <!-- Header/Label -->
                <div *ngIf="item.isHeader" class="mt-8 px-4 first:mt-0">
                    <div class="sidebar-section-label px-4 mb-2">
                        <span class="sidebar-label text-[10px] uppercase tracking-[0.2em] text-silver-500 font-bold">{{ item.label | translate }}</span>
                    </div>
                </div>

                <!-- Regular Link with optional sub-items -->
                <div *ngIf="!item.isHeader" class="space-y-1">
                    <a *ngIf="item.route" [routerLink]="item.route" routerLinkActive="bg-primary/5 text-primary border-primary" [routerLinkActiveOptions]="{exact: item.exact ?? false}"
                        (click)="onNavigate()"
                        class="flex items-center gap-3 px-4 py-3 text-silver-400 hover:text-white hover:bg-white/5 transition-all border-l-2 border-transparent rounded-r-lg">
                        <span class="material-symbols-outlined">{{ item.icon }}</span>
                        <span class="sidebar-label text-xs font-bold uppercase tracking-widest">{{ item.label | translate }}</span>
                    </a>

                    <div *ngIf="!item.route" class="flex items-center gap-3 px-4 py-3 text-silver-400 border-l-2 border-transparent">
                        <span class="material-symbols-outlined">{{ item.icon }}</span>
                        <span class="sidebar-label text-xs font-bold uppercase tracking-widest">{{ item.label | translate }}</span>
                    </div>
                    
                    <!-- Sub-items -->
                    <div *ngIf="item.subItems && item.subItems.length" class="pl-4 ml-6 space-y-1 border-l border-white/5">
                        <a *ngFor="let sub of item.subItems" [routerLink]="sub.route" routerLinkActive="bg-primary/5 text-primary border-primary active-sub-item"
                            (click)="onNavigate()"
                            class="flex items-center gap-3 px-4 py-2 text-silver-500 hover:text-white transition-all group rounded-r-lg border-l-2 border-transparent">
                            <span class="material-symbols-outlined text-sm opacity-50 group-hover:opacity-100">{{ sub.icon }}</span>
                            <span class="sidebar-label text-[10px] font-bold uppercase tracking-widest">{{ sub.label | translate }}</span>
                        </a>
                    </div>
                </div>
            </ng-container>
        </div>
    </nav>

    <!-- User Profile Footer -->
    <div class="p-4 border-t border-slate-800/50">
        <div class="flex items-center gap-3 p-2 rounded-lg glass-card border border-white/5">
            <div class="h-8 w-8 rounded-full bg-primary/20 flex items-center justify-center text-primary border border-primary/20">
                <span class="material-symbols-outlined text-sm">person</span>
            </div>
            <div class="sidebar-label flex-1 overflow-hidden">
                <div class="text-[10px] font-bold text-white uppercase tracking-widest truncate">
                    {{ authService.currentUser()?.firstName || ('COMMON.USER' | translate) }}
                </div>
                <div class="text-[8px] text-silver-500 uppercase tracking-widest truncate">
                    {{ 'COMMON.AGENT' | translate }}
                </div>
            </div>
            <button (click)="logout()" class="text-silver-500 hover:text-red-400 transition-colors">
                <span class="material-symbols-outlined text-lg">logout</span>
            </button>
        </div>
    </div>
</div>
