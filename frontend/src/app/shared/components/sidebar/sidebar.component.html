<div class="h-screen w-64 glass-card border-r border-slate-800/50 flex flex-col fixed left-0 top-0">
    <!-- App Name / Logo -->
    <a routerLink="/" class="p-6 border-b border-slate-800/50 flex items-center gap-3 cursor-pointer group">
        <div class="h-8 w-8 rounded-full bg-primary/20 flex items-center justify-center text-primary border border-primary/20 group-hover:border-primary/50 transition-all">
            <span class="material-symbols-outlined text-sm">home_work</span>
        </div>
        <h1 class="text-xl font-black tracking-widest silver-glow uppercase group-hover:text-white transition-all">DOGHMANI</h1>
    </a>

    <!-- Navigation Links -->
    <nav class="flex-1 overflow-y-auto py-6">
        <div class="px-4 space-y-1">
            <a routerLink="/dashboard/overview" routerLinkActive="bg-primary/10 text-primary border-primary"
                class="flex items-center gap-3 px-4 py-3 text-silver-400 hover:text-white hover:bg-white/5 transition-all border-l-2 border-transparent">
                <span class="material-symbols-outlined">dashboard</span>
                <span class="text-xs font-bold uppercase tracking-widest">Overview</span>
            </a>
            <a routerLink="/dashboard/leads" routerLinkActive="bg-primary/10 text-primary border-primary"
                class="flex items-center gap-3 px-4 py-3 text-silver-400 hover:text-white hover:bg-white/5 transition-all border-l-2 border-transparent">
                <span class="material-symbols-outlined">group</span>
                <span class="text-xs font-bold uppercase tracking-widest">Leads</span>
            </a>
            <a routerLink="/dashboard/properties" routerLinkActive="bg-primary/10 text-primary border-primary"
                class="flex items-center gap-3 px-4 py-3 text-silver-400 hover:text-white hover:bg-white/5 transition-all border-l-2 border-transparent">
                <span class="material-symbols-outlined">real_estate_agent</span>
                <span class="text-xs font-bold uppercase tracking-widest">Properties</span>
            </a>
            <a routerLink="/dashboard/visits" routerLinkActive="bg-primary/10 text-primary border-primary"
                class="flex items-center gap-3 px-4 py-3 text-silver-400 hover:text-white hover:bg-white/5 transition-all border-l-2 border-transparent">
                <span class="material-symbols-outlined">event</span>
                <span class="text-xs font-bold uppercase tracking-widest">Visits</span>
            </a>
            <a routerLink="/dashboard/rentals" routerLinkActive="bg-primary/10 text-primary border-primary"
                class="flex items-center gap-3 px-4 py-3 text-silver-400 hover:text-white hover:bg-white/5 transition-all border-l-2 border-transparent">
                <span class="material-symbols-outlined">contract</span>
                <span class="text-xs font-bold uppercase tracking-widest">Active Rentals</span>
            </a>
            <a routerLink="/dashboard/teams" routerLinkActive="bg-primary/10 text-primary border-primary"
                class="flex items-center gap-3 px-4 py-3 text-silver-400 hover:text-white hover:bg-white/5 transition-all border-l-2 border-transparent">
                <span class="material-symbols-outlined">badge</span>
                <span class="text-xs font-bold uppercase tracking-widest">Team Management</span>
            </a>
        </div>

        <div class="mt-8 px-4">
            <div class="px-4 mb-2">
                <span class="text-[10px] uppercase tracking-[0.2em] text-silver-500 font-bold">System</span>
            </div>
            <a routerLink="/dashboard/config" routerLinkActive="bg-primary/10 text-primary border-primary"
                class="flex items-center gap-3 px-4 py-3 text-silver-400 hover:text-white hover:bg-white/5 transition-all border-l-2 border-transparent">
                <span class="material-symbols-outlined">settings</span>
                <span class="text-xs font-bold uppercase tracking-widest">Settings</span>
            </a>
        </div>
    </nav>

    <!-- User Profile Footer -->
    <div class="p-4 border-t border-slate-800/50">
        <div class="flex items-center gap-3 p-2 rounded-lg glass-card border border-white/5">
            <div class="h-8 w-8 rounded-full bg-primary/20 flex items-center justify-center text-primary border border-primary/20">
                <span class="material-symbols-outlined text-sm">person</span>
            </div>
            <div class="flex-1 overflow-hidden">
                <div class="text-[10px] font-bold text-white uppercase tracking-widest truncate">
                    {{ authService.currentUser()?.firstName || 'User' }}
                </div>
                <div class="text-[8px] text-silver-500 uppercase tracking-widest truncate">
                    Agent
                </div>
            </div>
            <button (click)="logout()" class="text-silver-500 hover:text-red-400 transition-colors">
                <span class="material-symbols-outlined text-lg">logout</span>
            </button>
        </div>
    </div>
</div>
