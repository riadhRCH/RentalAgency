<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8">
  <title>Frontend</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Josefin+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCe6374KnYQjlnY_7vpD3oKUeDtodQ6804&libraries=places"></script>
  <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0F766E",
                        "secondary": "#14B8A6",
                        "background-light": "#F0FDFA",
                        "background-dark": "#101622",
                        "silver": {
                            "100": "#f8f9fa",
                            "200": "#e9ecef",
                            "300": "#dee2e6",
                            "400": "#ced4da",
                            "500": "#adb5bd",
                        }
                    },
                    fontFamily: {
                        "display": ["Josefin Sans", "sans-serif"],
                        "serif": ["Cinzel", "serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                },
            },
        }
    </script>
</head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 selection:bg-primary selection:text-white">
  <app-root></app-root>
</body>
</html>
